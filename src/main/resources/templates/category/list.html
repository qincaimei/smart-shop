<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>分类管理</title>
    <style>
        .page-title{font-size:20px;padding:15px 0;border-bottom:1px solid #eee;margin-bottom:15px;}
        .badge{font-size:14px;color:#666;margin-left:10px;}
        .search-bar{margin-bottom:15px;}
        .btn{padding:6px 12px;text-decoration:none;border-radius:4px;border:none;cursor:pointer;display:inline-block;}
        .btn-success{background:#198754;color:white;}
        .btn-primary{background:#0d6efd;color:white;}
        .btn-danger{background:#dc3545;color:white;}
        table{width:100%;border-collapse:collapse;}
        th,td{border:1px solid #ddd;padding:12px;text-align:center;}
        .empty-msg{padding:40px;color:#888;font-size:15px;}
    </style>
</head>
<body>
<div class="page-title">
    📂 分类管理
    <span class="badge">共 <span th:text="${pageInfo.total}">0</span> 个分类</span>
</div>

<div class="search-bar">
    <div class="btns">
        <a sec:authorize="hasRole('ROLE_admin')" th:href="@{/category/add}" class="btn btn-success">➕ 新增分类</a >
    </div>
</div>

<div class="table-wrap">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>分类名称</th>
            <th>描述</th>
            <th sec:authorize="hasRole('ROLE_admin')">操作</th>
        </tr>
        </thead>
        <tbody>
        <!-- PageInfo一定不为空，直接遍历 -->
        <tr th:each="c : ${pageInfo.list}">
            <td th:text="${c.id}"></td>
            <td><strong th:text="${c.name}"></strong></td>
            <td th:text="${c.descp}"></td>
            <td sec:authorize="hasRole('ROLE_admin')">
                <a th:href="@{/category/edit/{id}(id=${c.id})}" class="btn btn-primary btn-sm">编辑</a >
                <a th:href="@{/category/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm" onclick="return confirm('确认删除该分类？')">删除</a >
            </td>
        </tr>
        <!-- 列表为空展示提示 -->
        <tr th:if="${#lists.isEmpty(pageInfo.list)}">
            <td colspan="4" class="empty-msg">📭 暂无分类数据</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
