<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增商品</title>
    <style>
        body {
            width: 600px;
            margin: 50px auto;
            font-family: "Microsoft YaHei";
        }
        .title {
            font-size: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .item {
            margin: 18px 0;
        }
        label {
            display: inline-block;
            width: 90px;
        }
        input, select, textarea {
            width: 320px;
            padding: 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 22px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
        }
    </style>
</head>
<body>
<div class="title">新增商品信息</div>
<!-- 提交地址对应后端 /product/save -->
<form th:action="@{/product/save}" method="post">
    <div class="item">
        <label>商品名称：</label>
        <input type="text" name="title" required>
    </div>

    <div class="item">
        <label>所属分类：</label>
        <select name="catId">
            <!-- 遍历后端传过来的分类下拉数据 -->
            <option th:each="cate : ${categories}" th:value="${cate.id}" th:text="${cate.name}"></option>
        </select>
    </div>

    <div class="item">
        <label>商品单价：</label>
        <input type="number" step="0.01" name="price" required>
    </div>

    <div class="item">
        <label>图片路径：</label>
        <input type="text" name="photoUrl" placeholder="/img/xxx.png">
    </div>

    <div class="item">
        <label>商品简介：</label>
        <textarea name="info" rows="4"></textarea>
    </div>

    <div class="item">
        <button type="submit">提交保存</button>
        <a th:href="@{/product/list}">
            <button type="button">返回商品列表</button>
        </a >
    </div>
</form>
</body>
</html>
