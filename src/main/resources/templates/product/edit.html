<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑商品</title>
    <style>
        body {
            width: 600px;
            margin: 50px auto;
            font-family: "Microsoft YaHei";
        }
        .title {
            font-size: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .item {
            margin: 18px 0;
        }
        label {
            display: inline-block;
            width: 90px;
        }
        input, select, textarea {
            width: 320px;
            padding: 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 22px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 15px;
        }
        .btn-back {
            padding: 8px 22px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
<div class="title">编辑商品信息</div>
<form th:action="@{/product/update}" method="post">
    <!-- 隐藏域 -->
    <input type="hidden" name="id" th:value="${product.id}">

    <div class="item">
        <label>商品名称：</label>
        <input type="text" name="name" th:value="${product.name}" required>
    </div>

    <div class="item">
        <label>所属分类：</label>
        <select name="catId">
            <option th:each="cate : ${categories}"
                    th:value="${cate.id}"
                    th:text="${cate.name}"
                    th:selected="${cate.id == product.catId}">
            </option>
        </select>
    </div>

    <div class="item">
        <label>商品单价：</label>
        <input type="number" step="0.01" name="price" th:value="${product.price}" required>
    </div>

    <div class="item">
        <label>图片路径：</label>
        <input type="text" name="photoUrl" th:value="${product.photoUrl}">
    </div>

    <div class="item">
        <label>商品简介：</label>
        <textarea name="descp" rows="4" th:text="${product.descp}"></textarea>
    </div>

    <div class="item">
        <button type="submit">确认修改</button>
        <a th:href="@{/product/list}" class="btn-back">返回列表</a >
    </div>
</form>
</body>
</html>
