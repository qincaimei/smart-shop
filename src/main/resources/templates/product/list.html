<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>商品管理</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            padding: 20px;
            margin: 0;
        }
        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a3a5c;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title .badge {
            font-size: 13px;
            font-weight: 400;
            color: #888;
        }

        /* ===== 搜索栏 ===== */
        .search-bar {
            background: white;
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            align-items: flex-end;
        }
        .search-bar .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .search-bar .field label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }
        .search-bar .field input,
        .search-bar .field select {
            padding: 8px 14px;
            border: 1.5px solid #e0e5ec;
            border-radius: 6px;
            font-size: 14px;
            min-width: 140px;
            outline: none;
            transition: 0.3s;
            background: white;
        }
        .search-bar .field input:focus,
        .search-bar .field select:focus {
            border-color: #2d6a9f;
            box-shadow: 0 0 0 3px rgba(45,106,159,0.1);
        }
        .search-bar .field input[type="number"] {
            width: 100px;
        }
        .search-bar .btns {
            display: flex;
            gap: 10px;
            margin-left: auto;
            align-items: center;
        }
        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary {
            background: #2d6a9f;
            color: white;
        }
        .btn-primary:hover {
            background: #1a3a5c;
            transform: translateY(-1px);
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background: #1e8449;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-outline {
            background: transparent;
            color: #555;
            border: 1.5px solid #ddd;
        }
        .btn-outline:hover {
            background: #f0f0f0;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        /* ===== 表格 ===== */
        .table-wrap {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            background: #f8f9fc;
            color: #444;
            font-weight: 600;
            font-size: 14px;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid #e8ecf1;
        }
        table td {
            padding: 13px 16px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 14px;
            color: #333;
        }
        table tr:hover td {
            background: #fafbfc;
        }
        table .photo {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
            background: #f0f2f5;
        }
        table .tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            background: #e8f0fe;
            color: #2d6a9f;
        }
        .text-muted {
            color: #999;
            font-size: 13px;
        }
        .price {
            font-weight: 600;
            color: #e67e22;
        }

        /* ===== 分页 ===== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px 20px;
            gap: 8px;
            background: #fafbfc;
            border-top: 1px solid #eee;
        }
        .pagination .page-btn {
            padding: 6px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            text-decoration: none;
            color: #333;
        }
        .pagination .page-btn:hover {
            background: #f0f7ff;
            border-color: #2d6a9f;
        }
        .pagination .page-btn.active {
            background: #2d6a9f;
            border-color: #2d6a9f;
            color: white;
        }
        .pagination .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .info {
            color: #888;
            font-size: 14px;
            margin: 0 12px;
        }

        .empty-msg {
            text-align: center;
            padding: 40px 0;
            color: #999;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="page-title">
    📦 商品管理
    <span class="badge">共 <span th:text="${pageInfo.total}">0</span> 件商品</span>
</div>

<!-- ===== 搜索栏 ===== -->
<form th:action="@{/product/list}" method="get" class="search-bar">
    <!-- 隐藏的分页参数：保持当前页 -->
    <input type="hidden" name="pageNum" value="1">

    <div class="field">
        <label>分类</label>
        <select name="catId">
            <option value="">全部</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${c.id == catId}">
            </option>
        </select>
    </div>

    <div class="field">
        <label>商品名称</label>
        <input type="text" name="name" placeholder="搜索商品..."
               th:value="${name}">
    </div>

    <div class="field">
        <label>价格区间</label>
        <div style="display:flex;gap:6px;align-items:center;">
            <input type="number" name="minPrice" placeholder="最低"
                   th:value="${minPrice}" step="0.01" style="width:80px;">
            <span style="color:#999;">~</span>
            <input type="number" name="maxPrice" placeholder="最高"
                   th:value="${maxPrice}" step="0.01" style="width:80px;">
        </div>
    </div>

    <div class="btns">
        <button type="submit" class="btn btn-primary">🔍 搜索</button>
        <a th:href="@{/product/list}" class="btn btn-outline">🔄 重置</a >

        <!-- 只有管理员可以看到"新增"按钮 -->
        <a sec:authorize="hasRole('ROLE_admin')"
           th:href="@{/product/add}" class="btn btn-success">➕ 新增商品</a >
    </div>
</form>

<!-- ===== 表格 ===== -->
<div class="table-wrap">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>图片</th>
            <th>商品名称</th>
            <th>分类</th>
            <th>价格</th>
            <th>描述</th>
            <th>上架日期</th>
            <th sec:authorize="hasRole('ROLE_admin')">操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pageInfo.list}">
            <td th:text="${p.id}">1</td>
            <td>
                <img class="photo" th:src="${p.photoUrl}"
                     alt="商品图片" onerror="this.src='/img/default.png'">
            </td>
            <td><strong th:text="${p.name}">商品名</strong></td>
            <td><span class="tag" th:text="${p.categoryName}">分类</span></td>
            <td class="price">¥ <span th:text="${p.price}">99.00</span></td>
            <td class="text-muted" th:text="${#strings.abbreviate(p.descp, 20)}">描述</td>
            <td class="text-muted" th:text="${p.releaseDate}">2024-01-01</td>
            <td sec:authorize="hasRole('ROLE_admin')">
                <a th:href="@{/product/edit(id=${p.id})}" class="btn btn-primary btn-sm">编辑</a >
                <a th:href="@{/product/delete/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('确认删除？')">删除</a >
            </td>
        </tr>
        <tr th:if="${pageInfo.list == null or pageInfo.list.isEmpty()}">
            <td colspan="8" class="empty-msg">📭 暂无商品数据</td>
        </tr>
        </tbody>
    </table>

    <!-- ===== 分页 ===== -->
    <div class="pagination" th:if="${pageInfo.total > 0}">
        <!-- 首页 -->
        <a th:href="@{/product/list(pageNum=1, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           class="page-btn" th:classappend="${pageInfo.pageNum == 1} ? 'disabled' : ''">
            ⏮ 首页
        </a >

        <!-- 上一页 -->
        <a th:href="@{/product/list(pageNum=${pageInfo.pageNum - 1}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           class="page-btn" th:classappend="${pageInfo.hasPreviousPage} ? '' : 'disabled'">
            ◀ 上一页
        </a >

        <span class="info">
                第 <strong th:text="${pageInfo.pageNum}">1</strong> /
                <span th:text="${pageInfo.pages}">1</span> 页
                （共 <span th:text="${pageInfo.total}">0</span> 条）
            </span>

        <!-- 下一页 -->
        <a th:href="@{/product/list(pageNum=${pageInfo.pageNum + 1}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           class="page-btn" th:classappend="${pageInfo.hasNextPage} ? '' : 'disabled'">
            下一页 ▶
        </a >

        <!-- 尾页 -->
        <a th:href="@{/product/list(pageNum=${pageInfo.pages}, catId=${catId}, name=${name}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           class="page-btn" th:classappend="${pageInfo.pageNum == pageInfo.pages} ? 'disabled' : ''">
            尾页 ⏭
        </a >
    </div>
</div>

</body>
</html>
